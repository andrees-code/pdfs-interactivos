<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" width="128" height="128">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Document with flowing lines -->
  <g transform="translate(20, 16)">
    <!-- Main document -->
    <path d="M 8 0 L 8 80 Q 8 88 16 88 L 72 88 Q 80 88 80 80 L 80 8 Q 80 0 72 0 Z" 
          fill="url(#iconGradient)"/>
    
    <!-- Inner lines (content) -->
    <g stroke="rgba(255,255,255,0.9)" stroke-width="1.5" stroke-linecap="round" fill="none">
      <line x1="16" y1="16" x2="64" y2="16"/>
      <line x1="16" y1="28" x2="72" y2="28"/>
      <line x1="16" y1="40" x2="72" y2="40"/>
      
      <!-- Flowing element - represents transformation -->
      <path d="M 16 52 Q 32 48 48 54 T 72 52" stroke="rgba(255,255,255,0.7)" stroke-width="1.2"/>
      <path d="M 16 64 Q 28 60 44 66 T 72 64" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
    </g>
  </g>
</svg>